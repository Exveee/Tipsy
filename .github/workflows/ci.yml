name: CI

# Build + test on every push/PR. Signed, notarized, distributable builds are
# produced separately by .github/workflows/release.yml (triggered on v* tags).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v
