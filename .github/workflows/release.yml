# Release: build a signed + notarized Tipsy.app and attach it to a GitHub Release.
#
# Triggered on pushing a tag like `v1.2.3`, or manually via workflow_dispatch.
#
# Required repository secrets for a fully signed + notarized build:
#   MACOS_CERTIFICATE      - base64-encoded Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD  - password for the .p12
#   KEYCHAIN_PASSWORD      - any password used for the temporary build keychain
#   SIGN_IDENTITY          - the codesign identity string, e.g.
#                            "Developer ID Application: Your Name (TEAMID)"
#   AC_API_KEY_ID          - App Store Connect API key ID
#   AC_API_ISSUER_ID       - App Store Connect API issuer ID
#   AC_API_KEY             - base64-encoded App Store Connect API key (.p8)
#
# If MACOS_CERTIFICATE is absent, the workflow still succeeds: it builds an
# ad-hoc-signed app and uploads it as an artifact (no notarization, and it is
# only attached to a Release on a tag push). This keeps the workflow runnable
# on forks / before secrets are configured.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Decide whether we have signing/notarization material available.
      # We avoid referencing `secrets` directly in `if:` conditions by mapping
      # the presence of the cert into a step output here.
      - name: Detect signing capability
        id: caps
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MACOS_CERTIFICATE not set — building ad-hoc (unsigned, no notarization)."
          fi
          if [ -n "$AC_API_KEY" ]; then
            echo "notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show Swift version
        run: swift --version

      # Import the Developer ID certificate into a temporary keychain.
      - name: Import signing certificate
        if: steps.caps.outputs.sign == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the temporary keychain searchable by codesign.
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$CERT_PATH"

      # Build + assemble the app. SIGN_IDENTITY="-" forces ad-hoc when unsigned.
      - name: Build and sign app bundle
        env:
          SIGN_IDENTITY: ${{ steps.caps.outputs.sign == 'true' && secrets.SIGN_IDENTITY || '-' }}
        run: |
          set -euo pipefail
          ./Scripts/bundle.sh release
          codesign --verify --verbose dist/Tipsy.app || true

      # Zip, notarize, and staple — only when we have an API key.
      - name: Notarize and staple
        if: steps.caps.outputs.sign == 'true' && steps.caps.outputs.notarize == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$AC_API_KEY" | base64 --decode > "$API_KEY_PATH"

          # notarytool requires a zip (or dmg/pkg) of the app.
          ditto -c -k --keepParent dist/Tipsy.app "$RUNNER_TEMP/Tipsy-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/Tipsy-notarize.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait

          xcrun stapler staple dist/Tipsy.app
          xcrun stapler validate dist/Tipsy.app
          rm -f "$API_KEY_PATH"

      # Produce the distributable zip (stapled if notarized, else ad-hoc/signed).
      - name: Package app
        run: |
          set -euo pipefail
          mkdir -p out
          ditto -c -k --keepParent dist/Tipsy.app out/Tipsy.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tipsy-app
          path: out/Tipsy.zip
          if-no-files-found: error

      # Attach to a GitHub Release only on a tag push.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/Tipsy.zip
          fail_on_unmatched_files: true
